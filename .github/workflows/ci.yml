name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, linux, obsidian]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pillow matplotlib PySide6 pytest
      - run: python -m py_compile app.py orbitrx/main.py
      - run: pytest tests/ -q
